<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CHECKOUT | SUGAR RUSH</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@800&family=Space+Grotesk:wght@700&display=swap" rel="stylesheet">
    <style>
        :root { --neon-pink: #ff00ff; --neon-yellow: #ccff00; }
        body { font-family: 'Space Grotesk', sans-serif; background: #f0f0f0; }
        .brutal-input { border: 4px solid black; padding: 1rem; width: 100%; font-weight: 700; outline: none; margin-bottom: 1rem; }
        .brutal-input:focus { border-color: var(--neon-pink); box-shadow: 4px 4px 0px black; }
    </style>
</head>
<body class="p-8">
    <nav class="mb-12 flex justify-between items-center">
        <a href="/" class="text-4xl font-black italic">SUGAR<span class="text-pink-500">RUSH</span></a>
        <a href="/shop" class="font-bold underline">BACK TO SHOP</a>
    </nav>

    <div class="max-w-4xl mx-auto grid grid-cols-1 md:grid-cols-2 gap-12">
        <div class="bg-white border-4 border-black p-8 shadow-[8px_8px_0px_black]">
            <h2 class="text-2xl font-black italic mb-6 uppercase" style="font-family: 'Syne';">Checkout</h2>
            <input type="text" placeholder="CARD NUMBER" class="brutal-input">
            <div class="grid grid-cols-2 gap-4">
                <input type="text" placeholder="MM/YY" class="brutal-input">
                <input type="text" placeholder="CVC" class="brutal-input">
            </div>
            <button class="w-full bg-[#ccff00] border-4 border-black p-4 font-black text-2xl italic uppercase shadow-[6px_6px_0px_black]">Pay Now</button>
        </div>

        <div class="bg-white border-4 border-black p-8 h-fit">
            <h2 class="text-2xl font-black italic mb-6 uppercase" style="font-family: 'Syne';">Your Haul</h2>
            <div id="summary-items"></div>
            <div class="border-t-4 border-black pt-4 mt-4 flex justify-between font-black text-3xl italic">
                <span>TOTAL</span>
                <span id="summary-total" class="text-pink-500">$0.00</span>
            </div>
        </div>
    </div>

    <script>
        const cart = JSON.parse(localStorage.getItem('candy-cart') || '[]');
        let total = 0;
        document.getElementById('summary-items').innerHTML = cart.map(item => {
            total += item.price;
            return `<div class="flex justify-between py-2 border-b"><span>${item.name}</span><b>$${item.price}</b></div>`;
        }).join('');
        document.getElementById('summary-total').innerText = `$${total.toFixed(2)}`;
    </script>
</body>
</html>
