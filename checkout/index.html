<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CHECKOUT | SUGAR RUSH</title>
    <link rel="icon" type="image/png" href="https://img.sanishtech.com/u/0a9cd5c6da8220c084fc3ddd80fcd83a.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Space+Grotesk:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root { --neon-pink: #ff00ff; --neon-yellow: #ccff00; --ink-black: #1a1a1a; }
        body { font-family: 'Space Grotesk', sans-serif; background-color: #f0f0f0; margin: 0; padding-bottom: 5rem; }
        .brutal-input { border: 4px solid black; padding: 1rem; width: 100%; font-weight: 700; outline: none; transition: 0.1s; background: white; }
        .brutal-input:focus { border-color: var(--neon-pink); box-shadow: 4px 4px 0px black; }
        .section-header { font-family: 'Syne'; font-weight: 900; text-transform: uppercase; font-style: italic; font-size: 1.5rem; margin-bottom: 1.5rem; border-bottom: 4px solid black; display: inline-block; }
        .brutal-card { background: white; border: 4px solid black; box-shadow: 8px 8px 0px black; padding: 2rem; }
    </style>
</head>
<body>
    <nav class="bg-white border-b-4 border-black p-4 flex justify-between items-center h-24 mb-12">
        <a href="/" class="text-3xl font-extrabold no-underline text-black uppercase italic">SUGAR<span class="text-pink-500">RUSH</span></a>
        <a href="/shop" class="font-bold border-2 border-black px-6 py-2 bg-black text-white hover:bg-pink-500 transition-colors uppercase italic text-center">Back to Shop</a>
    </nav>
    <main class="max-w-6xl mx-auto px-6 grid grid-cols-1 lg:grid-cols-2 gap-12">
        <div class="space-y-12">
            <div><h2 class="section-header">1. Shipping</h2><div class="grid grid-cols-2 gap-4"><input type="text" placeholder="FIRST NAME" class="brutal-input"><input type="text" placeholder="LAST NAME" class="brutal-input"><input type="text" placeholder="ADDRESS" class="brutal-input col-span-2"></div></div>
            <div><h2 class="section-header">2. Payment</h2><div class="brutal-card bg-yellow-50 space-y-4"><input type="text" placeholder="CARD NUMBER" class="brutal-input"><div class="grid grid-cols-2 gap-4"><input type="text" placeholder="MM/YY" class="brutal-input"><input type="text" placeholder="CVC" class="brutal-input"></div></div></div>
            <button class="w-full bg-[#ccff00] border-4 border-black p-6 font-black text-3xl italic uppercase shadow-[10px_10px_0px_black] hover:shadow-[12px_12px_0px_black] transition-all">Pay & Blast Off</button>
        </div>
        <div class="brutal-card h-fit sticky top-32"><h2 class="section-header">Your Haul</h2><div id="checkout-items" class="space-y-4 mb-8"></div><div class="border-t-4 border-black pt-4 flex justify-between font-black text-3xl italic"><span>TOTAL</span><span id="total" class="text-pink-500">$0.00</span></div></div>
    </main>
    <script>
        const cart = JSON.parse(localStorage.getItem('candy-cart') || '[]');
        if (cart.length === 0) window.location.href = '/shop';
        let total = 0;
        document.getElementById('checkout-items').innerHTML = cart.map(item => { total += item.price; return `<div class="flex justify-between"><div><p class="font-black uppercase">${item.name}</p></div><span class="font-bold">$${item.price.toFixed(2)}</span></div>`; }).join('');
        document.getElementById('total').innerText = `$${total.toFixed(2)}`;
    </script>
</body>
</html>
