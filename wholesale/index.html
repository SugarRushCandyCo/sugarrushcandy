<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WHOLESALE | SUGAR RUSH</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@800&family=Space+Grotesk:wght@500&display=swap" rel="stylesheet">
    <style>
        :root { --neon-pink: #ff00ff; --neon-yellow: #ccff00; --ink-black: #1a1a1a; }
        body { font-family: 'Space Grotesk', sans-serif; background-color: var(--ink-black); color: white; }
        h1, .brand-font { font-family: 'Syne', sans-serif; text-transform: uppercase; }
        .active-link { color: var(--neon-pink) !important; text-decoration: underline; text-decoration-thickness: 4px; text-underline-offset: 8px; }
    </style>
</head>
<body>
    <nav class="sticky top-0 z-50 bg-white border-b-4 border-black p-4 flex justify-between items-center text-black">
        <a href="/sugarrushcandy" class="text-3xl font-extrabold brand-font no-underline text-black">SUGAR<span class="text-pink-500">RUSH</span></a>
        <div class="hidden md:flex items-center space-x-12 uppercase font-bold text-sm">
            <a href="/sugarrushcandy/shop" class="hover:text-pink-500 transition-colors">Shop All</a>
            <a href="/sugarrushcandy/wholesale" class="active-link">Wholesale</a>
        </div>
        <div class="w-8"></div>
    </nav>

    <main class="max-w-4xl mx-auto py-32 px-6 text-center">
        <h1 class="text-7xl font-black italic mb-8" style="color: var(--neon-yellow);">WHOLESALE MANIFEST</h1>
        <p class="text-xl mb-12 opacity-80">Bulk orders, custom mixes, and event operations.</p>
        
        <div class="bg-white text-black p-10 border-8 border-neon-yellow shadow-[15px_15px_0px_white]">
            <form class="space-y-4">
                <input type="text" placeholder="COMPANY NAME" class="border-4 border-black p-4 w-full font-bold">
                <input type="email" placeholder="CONTACT EMAIL" class="border-4 border-black p-4 w-full font-bold">
                <textarea placeholder="DESCRIBE YOUR VOLUME NEEDS" class="border-4 border-black p-4 w-full h-32 font-bold"></textarea>
                <button type="button" class="w-full bg-black text-white py-4 font-black text-2xl hover:bg-neon-pink">SEND MANIFEST</button>
            </form>
        </div>
    </main>
</body>
</html>
