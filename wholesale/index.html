<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WHOLESALE | SUGAR RUSH</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@800&family=Space+Grotesk:wght@500&display=swap" rel="stylesheet">
    <style>
        :root { --neon-pink: #ff00ff; --neon-yellow: #ccff00; --ink-black: #1a1a1a; }
        body { font-family: 'Space Grotesk', sans-serif; background-color: var(--ink-black); color: white; }
        h1, .brand-font { font-family: 'Syne', sans-serif; text-transform: uppercase; }
        .nav-link { font-weight: 700; text-transform: uppercase; font-size: 0.875rem; transition: all 0.2s; border-bottom: 4px solid transparent; padding-bottom: 4px; color: black; text-decoration: none; }
        .active-link { color: var(--neon-pink) !important; border-bottom: 4px solid var(--neon-pink); }
    </style>
</head>
<body>
    <nav class="sticky top-0 z-50 bg-white border-b-4 border-black p-4 flex justify-between items-center h-20">
        <div class="w-48 flex-shrink-0">
            <a href="/sugarrushcandy" class="text-3xl font-extrabold brand-font no-underline text-black">SUGAR<span class="text-pink-500">RUSH</span></a>
        </div>
        <div class="hidden md:flex items-center space-x-12">
            <a href="/sugarrushcandy" class="nav-link">Home</a>
            <a href="/sugarrushcandy/shop" class="nav-link">Shop All</a>
            <a href="/sugarrushcandy/wholesale" class="nav-link active-link">Wholesale</a>
        </div>
        <div class="w-48 flex-shrink-0 flex justify-end"></div>
    </nav>

    <main class="max-w-4xl mx-auto py-32 px-6 text-center">
        <h1 class="text-7xl font-black italic mb-8 uppercase" style="color: var(--neon-yellow);">Bulk Manifest</h1>
        <div class="bg-white text-black p-10 border-8 border-neon-yellow shadow-[15px_15px_0px_white]">
            <form class="space-y-4">
                <input type="text" placeholder="COMPANY NAME" class="border-4 border-black p-4 w-full font-bold">
                <input type="email" placeholder="CONTACT EMAIL" class="border-4 border-black p-4 w-full font-bold">
                <button type="button" class="w-full bg-black text-white py-4 font-black text-2xl hover:bg-neon-pink">SEND MANIFEST</button>
            </form>
        </div>
    </main>
</body>
</html>
