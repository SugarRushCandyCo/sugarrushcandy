<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WHOLESALE | SUGAR RUSH</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@800&family=Space+Grotesk:wght@500&display=swap" rel="stylesheet">
    <style>
        :root { --neon-yellow: #ccff00; --ink-black: #1a1a1a; }
        body { font-family: 'Space Grotesk', sans-serif; background-color: var(--ink-black); color: white; }
        h1, h2, .brand-font { font-family: 'Syne', sans-serif; text-transform: uppercase; }
        .input-brutal { background: white; border: 4px solid var(--neon-yellow); padding: 15px; color: black; font-weight: bold; width: 100%; outline: none; }
        .btn-neon { background: var(--neon-yellow); color: black; font-weight: 800; padding: 20px; text-align: center; border: none; cursor: pointer; transition: 0.2s; }
        .btn-neon:hover { transform: scale(1.02); filter: brightness(1.1); }
    </style>
</head>
<body>
    <nav class="p-4 flex justify-between items-center border-b-2 border-white">
        <a href="../" class="text-3xl font-extrabold brand-font text-white no-underline">SUGAR<span class="text-pink-500">RUSH</span></a>
        <a href="../shop/" class="text-white uppercase font-bold text-sm border-2 border-white px-4 py-2">Back to Shop</a>
    </nav>

    <main class="max-w-4xl mx-auto py-20 px-6">
        <h1 class="text-5xl md:text-7xl font-black mb-8 italic text-neon-yellow" style="color: var(--neon-yellow);">BULK RUSH.</h1>
        <p class="text-xl mb-12 opacity-80">Stock your shop, event, or office with the most aggressive candy flavors on the market. Fill out the manifest below.</p>

        <form class="space-y-6">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <input type="text" placeholder="COMPANY NAME" class="input-brutal">
                <input type="email" placeholder="CONTACT EMAIL" class="input-brutal">
            </div>
            <select class="input-brutal">
                <option>ESTIMATED VOLUME (LBS)</option>
                <option>50 - 100 LBS</option>
                <option>100 - 500 LBS</option>
                <option>500+ LBS</option>
            </select>
            <textarea placeholder="WHICH PRODUCTS ARE YOU LOOKING TO BULK?" rows="5" class="input-brutal"></textarea>
            <button type="button" class="btn-neon w-full text-2xl" onclick="alert('Manifest Sent. Stand by.')">REQUEST WHOLESALE PRICING</button>
        </form>
    </main>

    <footer class="py-10 text-center opacity-50 text-xs tracking-widest">
        © 2026 SUGAR RUSH BULK DIVISION. ALL RIGHTS RESERVED.
    </footer>
</body>
</html>
