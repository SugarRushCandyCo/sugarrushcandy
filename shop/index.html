<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SHOP | SUGAR RUSH</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Space+Grotesk:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root { --neon-pink: #ff00ff; --neon-yellow: #ccff00; --neon-blue: #00f0ff; --ink-black: #1a1a1a; }
        body { font-family: 'Space Grotesk', sans-serif; background-color: #f0f0f0; color: var(--ink-black); }
        h1, .brand-font { font-family: 'Syne', sans-serif; text-transform: uppercase; }
        .brutal-card { background: white; border: 4px solid var(--ink-black); box-shadow: 8px 8px 0px var(--ink-black); }
        .btn-main { background: var(--neon-yellow); border: 3px solid var(--ink-black); padding: 10px 20px; font-weight: 800; box-shadow: 4px 4px 0px var(--ink-black); }
        .cart-dot { background: var(--neon-pink); width: 20px; height: 20px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; color: white; position: absolute; top: -5px; right: -10px; border: 2px solid var(--ink-black); }
    </style>
</head>
<body>
    <nav class="sticky top-0 z-50 bg-white border-b-4 border-black p-4 flex justify-between items-center">
        <a href="/" class="text-3xl font-extrabold brand-font no-underline text-black">SUGAR<span class="text-pink-500">RUSH</span></a>
        <div class="hidden md:flex items-center space-x-8">
            <a href="/shop/" class="text-pink-500 font-bold underline decoration-4 underline-offset-4">Shop All</a>
            <a href="/varietybags/" class="hover:text-pink-500 font-bold uppercase text-sm">Variety Bags</a>
            <a href="/wholesale/" class="hover:text-pink-500 font-bold uppercase text-sm">Wholesale</a>
        </div>
        <div class="relative cursor-pointer" onclick="toggleCart()">
            <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4Z"/><path d="M3 6h18"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>
            <div id="cart-count" class="cart-dot">0</div>
        </div>
    </nav>

    <header class="py-12 px-6 text-center border-b-4 border-black bg-white">
        <h1 class="text-5xl md:text-7xl font-black italic">A LA CARTE.</h1>
    </header>

    </body>
</html>
