<!DOCTYPE html>
<html lang="en" class="no-scrollbar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SHOP | SUGAR RUSH</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@800&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root { --neon-pink: #ff00ff; --neon-yellow: #ccff00; --ink-black: #1a1a1a; }
        body { font-family: 'Space Grotesk', sans-serif; background: #f9f9f9; margin: 0; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .drawer { position: fixed; right: -500px; top: 0; width: 450px; height: 100%; background: white; border-left: 6px solid black; z-index: 1000; transition: 0.4s; padding: 30px; display: flex; flex-direction: column; }
        .drawer.open { right: 0; }
        .checkout-btn { width: 100%; background: black; color: white; padding: 20px; font-weight: 900; font-size: 1.5rem; text-transform: uppercase; font-style: italic; border: 4px solid black; box-shadow: 6px 6px 0px var(--neon-pink); cursor: pointer; }
    </style>
</head>
<body>
    <nav class="bg-white border-b-4 border-black p-4 flex justify-between items-center h-24">
        <a href="/" class="text-3xl font-extrabold uppercase italic">SUGAR<span class="text-pink-500">RUSH</span></a>
        <div class="space-x-12">
            <a href="/" class="font-bold uppercase">Home</a>
            <a href="/shop" class="font-bold uppercase text-pink-500">Shop All</a>
        </div>
        <button onclick="toggleDrawer()" class="bg-black text-white px-6 py-2 font-bold italic">HAUL</button>
    </nav>

    <div id="cart-drawer" class="drawer">
        <h2 class="text-3xl font-black italic uppercase mb-4" style="font-family: 'Syne';">Your Haul</h2>
        <div id="cart-items" class="flex-grow"></div>
        <div class="pt-4 border-t-4 border-black">
            <div class="flex justify-between mb-4 font-black text-2xl"><span>TOTAL:</span><span id="cart-total">$0.00</span></div>
            <button onclick="window.location.href='/checkout'" class="checkout-btn">Secure the Sweets</button>
        </div>
    </div>

    <main class="p-12 text-center">
        <h1 class="text-6xl font-black mb-8 uppercase italic" style="font-family: 'Syne';">The Goods</h1>
        <button onclick="addToCart('Sour Mix', 12.00)" class="bg-black text-white p-4 font-bold">Add Sour Mix - $12</button>
    </main>

    <script>
        function toggleDrawer() { document.getElementById('cart-drawer').classList.toggle('open'); renderCart(); }
        function addToCart(name, price) {
            let cart = JSON.parse(localStorage.getItem('candy-cart') || '[]');
            cart.push({ id: Date.now(), name, price });
            localStorage.setItem('candy-cart', JSON.stringify(cart));
            renderCart();
        }
        function renderCart() {
            const cart = JSON.parse(localStorage.getItem('candy-cart') || '[]');
            const container = document.getElementById('cart-items');
            let total = 0;
            container.innerHTML = cart.map(item => {
                total += item.price;
                return `<div class="py-2 border-b border-black flex justify-between"><span>${item.name}</span><span>$${item.price}</span></div>`;
            }).join('');
            document.getElementById('cart-total').innerText = `$${total.toFixed(2)}`;
        }
    </script>
</body>
</html>
