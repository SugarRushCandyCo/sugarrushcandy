<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SHOP | SUGAR RUSH</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Space+Grotesk:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root { --neon-pink: #ff00ff; --neon-yellow: #ccff00; --neon-blue: #00f0ff; --ink-black: #1a1a1a; }
        body { font-family: 'Space Grotesk', sans-serif; background-color: #f0f0f0; color: var(--ink-black); overflow-x: hidden; }
        h1, h2, .brand-font { font-family: 'Syne', sans-serif; text-transform: uppercase; }
        .brutal-card { background: white; border: 4px solid var(--ink-black); box-shadow: 8px 8px 0px var(--ink-black); transition: all 0.2s ease; }
        .brutal-card:hover { transform: translate(-4px, -4px); box-shadow: 12px 12px 0px var(--neon-blue); }
        .btn-main { background: var(--neon-yellow); border: 3px solid var(--ink-black); padding: 10px 20px; font-weight: 800; box-shadow: 4px 4px 0px var(--ink-black); cursor: pointer; }
        .cart-dot { background: var(--neon-pink); width: 20px; height: 20px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; color: white; position: absolute; top: -5px; right: -10px; border: 2px solid var(--ink-black); }
    </style>
</head>
<body>
    <nav class="sticky top-0 z-50 bg-white border-b-4 border-black p-4 flex justify-between items-center">
        <a href="../" class="text-3xl font-extrabold tracking-tighter brand-font">SUGAR<span class="text-pink-500">RUSH</span></a>
        <div class="hidden md:flex space-x-8 font-bold uppercase text-sm">
            <a href="./" class="text-blue-500 underline decoration-4 underline-offset-4">Shop All</a>
            <a href="../varietybags/" class="hover:text-pink-500">Variety Bags</a>
        </div>
        <div class="relative cursor-pointer" onclick="toggleCart()">
            <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4Z"/><path d="M3 6h18"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>
            <div id="cart-count" class="cart-dot">0</div>
        </div>
    </nav>

    <header class="py-12 px-6 text-center border-b-4 border-black bg-white">
        <h1 class="text-5xl md:text-7xl font-black italic">THE FULL MENU.</h1>
    </header>

    <section class="py-16 px-6 max-w-7xl mx-auto grid grid-cols-2 md:grid-cols-4 gap-8">
        <div class="brutal-card p-6 flex flex-col items-center">
            <div class="text-6xl mb-4">🪱</div>
            <h3 class="font-black uppercase">Neon Worms</h3>
            <p class="text-2xl font-black mb-4">$4.00</p>
            <button onclick="addToCart('Neon Worms', 4)" class="btn-main w-full">ADD</button>
        </div>
        <div class="brutal-card p-6 flex flex-col items-center">
            <div class="text-6xl mb-4">🍒</div>
            <h3 class="font-black uppercase">Fizzy Cherries</h3>
            <p class="text-2xl font-black mb-4">$5.00</p>
            <button onclick="addToCart('Fizzy Cherries', 5)" class="btn-main w-full">ADD</button>
        </div>
    </section>

    <div id="cart-sidebar" class="fixed right-0 top-0 h-full w-80 bg-white border-l-4 border-black translate-x-full transition-transform duration-300 z-[60] p-6 flex flex-col">
        <div class="flex justify-between items-center mb-8"><h2 class="text-2xl font-black italic">HAUL</h2><button onclick="toggleCart()" class="text-3xl">&times;</button></div>
        <div id="cart-items" class="flex-grow overflow-y-auto"></div>
        <button class="btn-main w-full py-4 mt-4" onclick="alert('Checkout Ready!')">CHECKOUT</button>
    </div>

    <script>
        let cart = JSON.parse(localStorage.getItem('sugarRushCart')) || [];
        function toggleCart() { document.getElementById('cart-sidebar').classList.toggle('translate-x-full'); }
        function addToCart(name, price) { cart.push({ name, price }); updateUI(); }
        function updateUI() {
            localStorage.setItem('sugarRushCart', JSON.stringify(cart));
            document.getElementById('cart-count').innerText = cart.length;
            const container = document.getElementById('cart-items');
            container.innerHTML = cart.map((item, i) => `<div class="border-2 border-black p-2 mb-2 flex justify-between"><span>${item.name}</span><b>$${item.price}</b></div>`).join('');
        }
        window.onload = updateUI;
    </script>
</body>
</html>
