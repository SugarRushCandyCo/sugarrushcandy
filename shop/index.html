<!DOCTYPE html>
<html lang="en" class="no-scrollbar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SHOP | SUGAR RUSH</title>
    <link rel="icon" type="image/png" href="https://img.sanishtech.com/u/0a9cd5c6da8220c084fc3ddd80fcd83a.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@800&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root { --neon-pink: #ff00ff; --neon-yellow: #ccff00; --ink-black: #1a1a1a; }
        body { font-family: 'Space Grotesk', sans-serif; background: #f9f9f9; margin: 0; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .brutal-card { background: white; border: 4px solid black; box-shadow: 6px 6px 0px black; transition: 0.2s; }
        .brutal-card:hover { transform: translate(-2px, -2px); box-shadow: 10px 10px 0px black; }
        .drawer { position: fixed; right: -500px; top: 0; width: 450px; height: 100%; background: white; border-left: 6px solid black; z-index: 1000; transition: 0.4s; padding: 30px; display: flex; flex-direction: column; }
        .drawer.open { right: 0; }
        .checkout-btn { width: 100%; background: black; color: white; padding: 24px 0; font-weight: 900; font-size: 1.5rem; text-transform: uppercase; font-style: italic; border: 4px solid black; box-shadow: 6px 6px 0px var(--neon-pink); cursor: pointer; }
        .checkout-btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .candy-option { display: flex; align-items: center; justify-content: space-between; padding: 10px; border: 2px solid black; margin-bottom: 8px; cursor: pointer; background: white; }
        .candy-option:hover { background: var(--neon-yellow); }
    </style>
</head>
<body class="no-scrollbar">
    <div id="cart-drawer" class="drawer">
        <h2 class="text-3xl font-black italic uppercase border-b-4 border-black pb-4 mb-4" style="font-family: 'Syne';">Your Haul</h2>
        <div id="cart-items" class="flex-grow overflow-y-auto no-scrollbar"></div>
        <div class="pt-4 border-t-4 border-black mt-auto">
            <div class="flex justify-between mb-4 font-black text-2xl uppercase"><span>Subtotal:</span><span id="cart-subtotal">$0.00</span></div>
            <button id="checkout-btn" onclick="window.location.href='/checkout'" class="checkout-btn">Secure the Sweets</button>
        </div>
    </div>

    <div id="custom-drawer" class="drawer">
        <h2 class="text-2xl font-black italic uppercase mb-4" style="font-family: 'Syne';">Build Your Mix</h2>
        <div id="candy-list" class="flex-grow overflow-y-auto no-scrollbar">
            <label class="candy-option"><span>Sour Patch Kids</span><input type="checkbox" value="Sour Patch Kids"></label>
            <label class="candy-option"><span>Haribo Goldbears</span><input type="checkbox" value="Haribo Goldbears"></label>
            <label class="candy-option"><span>Nerds Gummy Clusters</span><input type="checkbox" value="Nerds Gummy Clusters"></label>
            <label class="candy-option"><span>Swedish Fish</span><input type="checkbox" value="Swedish Fish"></label>
        </div>
        <button onclick="confirmCustomMix()" class="checkout-btn mt-4" style="background: var(--neon-pink);">Add to Haul</button>
    </div>

    <nav class="sticky top-0 z-50 bg-white border-b-4 border-black p-4 flex justify-between items-center h-24">
        <a href="/" class="text-3xl font-extrabold uppercase italic">SUGAR<span class="text-pink-500">RUSH</span></a>
        <div class="space-x-12"><a href="/" class="nav-link">Home</a><a href="/shop" class="nav-link active-link">Shop All</a></div>
        <button onclick="toggleDrawer('cart-drawer')" class="font-bold border-2 border-black px-6 py-2 bg-black text-white hover:bg-pink-500 uppercase italic">HAUL (<span id="cart-count">0</span>)</button>
    </nav>

    <main class="max-w-4xl mx-auto py-12 px-6">
        <div class="space-y-6">
            <div class="brutal-card p-8 bg-pink-100 flex justify-between items-center">
                <div><h3 class="text-4xl font-black italic uppercase" style="font-family: 'Syne';">Sour Mix</h3></div>
                <div class="text-right"><p class="text-3xl font-black mb-4">$12.00</p><button onclick="addToCart('Sour Mix', 12.00)" class="bg-black text-white px-8 py-3 font-black uppercase">Add</button></div>
            </div>
            <div class="brutal-card p-8 bg-yellow-100 flex justify-between items-center">
                <div><h3 class="text-4xl font-black italic uppercase" style="font-family: 'Syne';">Custom Mix</h3></div>
                <div class="text-right"><p class="text-3xl font-black mb-4">$8.00+</p><button onclick="toggleDrawer('custom-drawer')" class="bg-black text-white px-8 py-3 font-black uppercase">Build</button></div>
            </div>
        </div>
    </main>

    <script>
        function toggleDrawer(id) { document.getElementById(id).classList.toggle('open'); if(id === 'cart-drawer') renderCart(); }
        function confirmCustomMix() {
            const selected = Array.from(document.querySelectorAll('#candy-list input:checked')).map(c => c.value);
            if(selected.length === 0) return;
            addToCart('Custom Mix', 8.00 + (selected.length * 0.50), selected);
            toggleDrawer('custom-drawer');
        }
        function addToCart(name, price, contents = []) {
            let cart = JSON.parse(localStorage.getItem('candy-cart') || '[]');
            cart.push({ id: Date.now(), name, price, contents });
            localStorage.setItem('candy-cart', JSON.stringify(cart));
            document.getElementById('cart-count').innerText = cart.length;
            if (document.getElementById('cart-drawer').classList.contains('open')) renderCart();
        }
        function removeFromCart(id) {
            let cart = JSON.parse(localStorage.getItem('candy-cart') || '[]').filter(item => item.id !== id);
            localStorage.setItem('candy-cart', JSON.stringify(cart));
            document.getElementById('cart-count').innerText = cart.length;
            renderCart();
        }
        function renderCart() {
            const cart = JSON.parse(localStorage.getItem('candy-cart') || '[]');
            const container = document.getElementById('cart-items');
            let total = 0;
            container.innerHTML = cart.map(item => {
                total += item.price;
                return `<div class="py-4 border-b-2 border-black flex justify-between items-center">
                    <div><p class="uppercase font-black text-sm">${item.name}</p></div>
                    <div class="text-right"><p class="font-bold text-pink-500">$${item.price.toFixed(2)}</p>
                    <button onclick="removeFromCart(${item.id})" class="text-[10px] uppercase underline">Remove</button></div>
                </div>`;
            }).join('');
            document.getElementById('cart-subtotal').innerText = `$${total.toFixed(2)}`;
            document.getElementById('checkout-btn').disabled = cart.length === 0;
        }
    </script>
</body>
</html>
