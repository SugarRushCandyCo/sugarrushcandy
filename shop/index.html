<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SHOP | SUGAR RUSH</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Space+Grotesk:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root { --neon-pink: #ff00ff; --neon-yellow: #ccff00; --ink-black: #1a1a1a; }
        /* Standardize scrollbar behavior to prevent layout shift */
        html { overflow-y: scroll; scroll-behavior: smooth; }
        body { font-family: 'Space Grotesk', sans-serif; background-color: #f9f9f9; margin: 0; }
        h1, h2, h3, .brand-font { font-family: 'Syne', sans-serif; text-transform: uppercase; }
        
        /* Rigid Nav Styling - Fixed Widths prevent "Dancing" */
        .nav-link { font-weight: 700; text-transform: uppercase; font-size: 0.875rem; transition: all 0.2s; border-bottom: 4px solid transparent; padding-bottom: 4px; color: black; text-decoration: none; display: inline-block; }
        .nav-link:hover { color: var(--neon-pink); }
        .active-link { color: var(--neon-pink) !important; border-bottom: 4px solid var(--neon-pink); }
        
        /* UI Elements */
        .brutal-card { background: white; border: 4px solid var(--ink-black); box-shadow: 6px 6px 0px var(--ink-black); transition: 0.1s; }
        .section-header { border-bottom: 4px solid black; background: white; padding: 20px; display: inline-block; transform: rotate(-1deg); margin-bottom: 40px; }

        /* Notification Toast */
        #toast { visibility: hidden; min-width: 250px; background-color: var(--neon-pink); color: white; text-align: center; border: 3px solid black; padding: 16px; position: fixed; z-index: 2000; left: 50%; transform: translateX(-50%); top: 30px; font-weight: 800; text-transform: uppercase; box-shadow: 6px 6px 0px black; }
        #toast.show { visibility: visible; animation: fadein 0.5s, fadeout 0.5s 2.5s; }

        /* Cart Drawer */
        #cart-drawer { position: fixed; right: -450px; top: 0; width: 400px; height: 100%; background: white; border-left: 6px solid black; z-index: 1000; transition: 0.4s cubic-bezier(0.19, 1, 0.22, 1); padding: 30px; box-shadow: -10px 0 0 rgba(0,0,0,0.1); }
        #cart-drawer.open { right: 0; }
        .cart-item { border-bottom: 2px solid #eee; padding: 15px 0; display: flex; justify-content: space-between; align-items: center; }

        @keyframes fadein { from {top: 0; opacity: 0;} to {top: 30px; opacity: 1;} }
        @keyframes fadeout { from {top: 30px; opacity: 1;} to {top: 0; opacity: 0;} }
    </style>
</head>
<body>
    <div id="toast">Added to Haul!</div>

    <div id="cart-drawer">
        <div class="flex justify-between items-center mb-8 border-b-4 border-black pb-4">
            <h2 class="text-3xl font-black italic">Your Haul</h2>
            <button onclick="toggleCart()" class="text-xl font-bold hover:text-pink-500">CLOSE [X]</button>
        </div>
        <div id="cart-items" class="mb-8 overflow-y-auto max-h-[60vh]">
            </div>
        <div class="border-t-4 border-black pt-4">
            <div class="flex justify-between text-2xl font-black mb-6">
                <span>TOTAL:</span>
                <span id="cart-total">$0.00</span>
            </div>
            <button class="w-full bg-black text-white py-4 font-black text-xl hover:bg-pink-500 uppercase italic transition-colors">Checkout Now</button>
        </div>
    </div>

    <nav class="sticky top-0 z-50 bg-white border-b-4 border-black p-4 flex justify-between items-center h-24">
        <div class="w-64 flex-shrink-0">
            <a href="/sugarrushcandy" class="text-3xl font-extrabold brand-font no-underline text-black">SUGAR<span class="text-pink-500">RUSH</span></a>
        </div>
        <div class="flex items-center space-x-12">
            <a href="/sugarrushcandy" class="nav-link">Home</a>
            <a href="/sugarrushcandy/shop" class="nav-link active-link">Shop All</a>
            <a href="/sugarrushcandy/wholesale" class="nav-link">Wholesale</a>
        </div>
        <div class="w-64 flex-shrink-0 flex justify-end">
            <button onclick="toggleCart()" class="font-bold border-2 border-black px-6 py-2 bg-black text-white hover:bg-pink-500 transition-colors">
                HAUL (<span id="cart-count">0</span>)
            </button>
        </div>
    </nav>

    <section class="py-20 px-6 max-w-7xl mx-auto">
        <div class="section-header"><h2 class="text-4xl font-black italic">Pick 'n' Mix</h2></div>
        <div class="grid grid-cols-2 md:grid-cols-4 gap-6 mb-20">
            <div class="brutal-card p-6 text-center">
                <div class="text-6xl mb-4">🌈</div>
                <h3 class="font-bold mb-2">Neon Worms</h3>
                <p class="text-2xl font-black mb-4">$4.00</p>
                <button onclick="addToCart('Neon Worms', 4.00)" class="w-full bg-yellow-300 border-2 border-black py-2 font-black uppercase hover:bg-black hover:text-white transition-all">Add</button>
            </div>
            <div class="brutal-card p-6 text-center">
                <div class="text-6xl mb-4">🍒</div>
                <h3 class="font-bold mb-2">Fizzy Cherry</h3>
                <p class="text-2xl font-black mb-4">$4.50</p>
                <button onclick="addToCart('Fizzy Cherry', 4.50)" class="w-full bg-yellow-300 border-2 border-black py-2 font-black uppercase hover:bg-black hover:text-white transition-all">Add</button>
            </div>
            <div class="brutal-card p-6 text-center">
                <div class="text-6xl mb-4">🧱</div>
                <h3 class="font-bold mb-2">Sour Bricks</h3>
                <p class="text-2xl font-black mb-4">$5.00</p>
                <button onclick="addToCart('Sour Bricks', 5.00)" class="w-full bg-yellow-300 border-2 border-black py-2 font-black uppercase hover:bg-black hover:text-white transition-all">Add</button>
            </div>
            <div class="brutal-card p-6 text-center">
                <div class="text-6xl mb-4">🛸</div>
                <h3 class="font-bold mb-2">Flying Saucers</h3>
                <p class="text-2xl font-black mb-4">$3.00</p>
                <button onclick="addToCart('Flying Saucers', 3.00)" class="w-full bg-yellow-300 border-2 border-black py-2 font-black uppercase hover:bg-black hover:text-white transition-all">Add</button>
            </div>
        </div>

        <div class="section-header bg-pink-500 text-white border-white"><h2 class="text-4xl font-black italic">Variety Bags</h2></div>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-10">
            <div class="brutal-card p-8 flex flex-col md:flex-row items-center gap-10">
                <div class="text-8xl">⚡️</div>
                <div>
                    <h3 class="text-3xl font-black mb-2">THE SOUR RUSH</h3>
                    <p class="font-black text-2xl mb-4 text-pink-500">$28.00</p>
                    <button onclick="addToCart('Sour Rush Bundle', 28.00)" class="bg-black text-white px-8 py-3 font-black uppercase hover:bg-pink-500 transition-colors">Add Bundle</button>
                </div>
            </div>
            <div class="brutal-card p-8 flex flex-col md:flex-row items-center gap-10">
                <div class="text-8xl">🍭</div>
                <div>
                    <h3 class="text-3xl font-black mb-2">SWEET TOOTH</h3>
                    <p class="font-black text-2xl mb-4 text-blue-500">$25.00</p>
                    <button onclick="addToCart('Sweet Tooth Bundle', 25.00)" class="bg-black text-white px-8 py-3 font-black uppercase hover:bg-blue-400 transition-colors">Add Bundle</button>
                </div>
            </div>
        </div>
    </section>

    <script>
        // Add this variable to the top of your script
let isDrawerOpen = false;

function toggleCart() {
    const drawer = document.getElementById('cart-drawer');
    isDrawerOpen = !isDrawerOpen; // Tracks if drawer is visible
    if (isDrawerOpen) {
        drawer.classList.add('open');
        renderCart();
    } else {
        drawer.classList.remove('open');
    }
}

function addToCart(name, price) {
    let cart = JSON.parse(localStorage.getItem('candy-cart') || '[]');
    cart.push({ id: Date.now(), name, price });
    localStorage.setItem('candy-cart', JSON.stringify(cart));
    
    updateHeaderCount();
    showToast(name + " ADDED!");

    // INSTANT UPDATE: If drawer is already open, refresh the list immediately
    if (isDrawerOpen) {
        renderCart();
    }
}

function removeFromCart(id) {
    let cart = JSON.parse(localStorage.getItem('candy-cart') || '[]');
    cart = cart.filter(item => item.id !== id);
    localStorage.setItem('candy-cart', JSON.stringify(cart));
    updateHeaderCount();
    renderCart();
}

function renderCart() {
    const cart = JSON.parse(localStorage.getItem('candy-cart') || '[]');
    const container = document.getElementById('cart-items');
    const totalEl = document.getElementById('cart-total');
    container.innerHTML = '';
    let total = 0;

    if (cart.length === 0) {
        container.innerHTML = '<p class="text-center py-10 opacity-50 font-bold">Your haul is empty...</p>';
    } else {
        cart.forEach(item => {
            total += item.price;
            container.innerHTML += `
                <div class="cart-item border-b-2 border-gray-100 py-4 flex justify-between items-center">
                    <div>
                        <p class="font-black uppercase text-sm">${item.name}</p>
                        <p class="font-bold text-gray-400">$${item.price.toFixed(2)}</p>
                    </div>
                    <button onclick="removeFromCart(${item.id})" class="text-red-500 font-black text-xs hover:underline">REMOVE</button>
                </div>
            `;
        });
    }
    totalEl.innerText = `$${total.toFixed(2)}`;
}

function updateHeaderCount() {
    const countEl = document.getElementById('cart-count');
    if (countEl) {
        const cart = JSON.parse(localStorage.getItem('candy-cart') || '[]');
        countEl.innerText = cart.length;
    }
}

// Ensure the count is correct when the page first loads
updateHeaderCount();
    </script>
</body>
</html>
