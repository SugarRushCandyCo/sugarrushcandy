<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SHOP | SUGAR RUSH</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Space+Grotesk:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root { --neon-pink: #ff00ff; --neon-yellow: #ccff00; --ink-black: #1a1a1a; }
        body { font-family: 'Space Grotesk', sans-serif; background-color: #f9f9f9; }
        h1, h2, h3, .brand-font { font-family: 'Syne', sans-serif; text-transform: uppercase; }
        .nav-link { font-weight: 700; text-transform: uppercase; font-size: 0.875rem; transition: all 0.2s; border-bottom: 4px solid transparent; padding-bottom: 4px; color: black; text-decoration: none; }
        .active-link { color: var(--neon-pink) !important; border-bottom: 4px solid var(--neon-pink); }
        .brutal-card { background: white; border: 4px solid var(--ink-black); box-shadow: 6px 6px 0px var(--ink-black); }
        .section-header { border-bottom: 4px solid black; background: white; padding: 20px; display: inline-block; transform: rotate(-1deg); margin-bottom: 40px; }
    </style>
</head>
<body>
    <nav class="sticky top-0 z-50 bg-white border-b-4 border-black p-4 flex justify-between items-center h-20">
        <div class="w-48 flex-shrink-0">
            <a href="/sugarrushcandy" class="text-3xl font-extrabold brand-font no-underline text-black">SUGAR<span class="text-pink-500">RUSH</span></a>
        </div>
        <div class="hidden md:flex items-center space-x-12">
            <a href="/sugarrushcandy" class="nav-link">Home</a>
            <a href="/sugarrushcandy/shop" class="nav-link active-link">Shop All</a>
            <a href="/sugarrushcandy/wholesale" class="nav-link">Wholesale</a>
        </div>
        <div class="w-48 flex-shrink-0 flex justify-end">
            <button class="font-bold border-2 border-black px-4 py-1">CART (0)</button>
        </div>
    </nav>

    <section class="py-20 px-6 max-w-7xl mx-auto">
        <div class="section-header"><h2 class="text-4xl font-black italic">Pick 'n' Mix</h2></div>
        <div class="grid grid-cols-2 md:grid-cols-4 gap-6 mb-20">
            <div class="brutal-card p-4 text-center"><div class="text-5xl mb-2">🌈</div><h3 class="font-bold">Neon Worms</h3><p class="font-black">$4.00</p></div>
            <div class="brutal-card p-4 text-center"><div class="text-5xl mb-2">🍒</div><h3 class="font-bold">Fizzy Cherry</h3><p class="font-black">$4.50</p></div>
            <div class="brutal-card p-4 text-center"><div class="text-5xl mb-2">🧱</div><h3 class="font-bold">Sour Bricks</h3><p class="font-black">$5.00</p></div>
            <div class="brutal-card p-4 text-center"><div class="text-5xl mb-2">🛸</div><h3 class="font-bold">Flying Saucers</h3><p class="font-black">$3.00</p></div>
        </div>

        <div class="section-header bg-pink-500 text-white border-white"><h2 class="text-4xl font-black italic">Variety Bags</h2></div>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-10">
            <div class="brutal-card p-8 flex items-center gap-6">
                <div class="text-7xl">⚡️</div>
                <div><h3 class="text-2xl font-black">THE SOUR RUSH</h3><p class="text-2xl font-black">$28.00</p></div>
            </div>
            <div class="brutal-card p-8 flex items-center gap-6">
                <div class="text-7xl">🍭</div>
                <div><h3 class="text-2xl font-black">SWEET TOOTH</h3><p class="text-2xl font-black">$25.00</p></div>
            </div>
        </div>
    </section>
</body>
</html>
