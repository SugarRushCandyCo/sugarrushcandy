<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SUGAR RUSH | HOME</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Space+Grotesk:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root { --neon-pink: #ff00ff; --neon-yellow: #ccff00; --ink-black: #1a1a1a; }
        body { font-family: 'Space Grotesk', sans-serif; background-color: #f0f0f0; }
        h1, .brand-font { font-family: 'Syne', sans-serif; text-transform: uppercase; }
        .btn-main { background: var(--neon-yellow); border: 3px solid var(--ink-black); padding: 15px 30px; font-weight: 800; box-shadow: 6px 6px 0px var(--ink-black); cursor: pointer; display: inline-block; }
    </style>
</head>
<body>
    <nav class="sticky top-0 z-50 bg-white border-b-4 border-black p-4 flex justify-between items-center">
        <div class="text-3xl font-extrabold brand-font">SUGAR<span class="text-pink-500">RUSH</span></div>
        <div class="space-x-8 font-bold uppercase text-sm">
            <a href="shop/" class="hover:text-pink-500">Shop All</a>
            <a href="varietybags/" class="hover:text-pink-500">Variety Bags</a>
        </div>
    </nav>

    <header class="py-32 px-6 text-center bg-blue-100 border-b-4 border-black">
        <h1 class="text-6xl md:text-9xl font-black mb-6 leading-none">CANDY FOR<br><span class="text-blue-600">THE COOL KIDS.</span></h1>
        <p class="text-xl mb-10 max-w-xl mx-auto font-medium">High-voltage flavors shipped straight to your door.</p>
        <a href="shop/" class="btn-main text-2xl">ENTER THE SHOP</a>
    </header>

    <section class="py-20 text-center">
        <h2 class="text-4xl font-black brand-font mb-4">NOT YOUR GRANDMA'S CANDY.</h2>
        <p>No licorice. No raisins. Just the good stuff.</p>
    </section>

    <footer class="py-12 border-t-4 border-black text-center font-bold">
        <p>© 2026 SUGAR RUSH CORP.</p>
    </footer>
</body>
</html>
